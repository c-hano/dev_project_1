<tr th:each="order : ${orders}">
    <td th:text="${order.order_id}"></td>
    <td th:text="${order.customer_email}"></td>
    <td th:text="${order.total_price}"></td>
    <td th:text="${order.order_state}"></td>
    <td>
        <a th:href="@{/orders/{id}(id=${order.order_id})}">Details</a>
        <form th:action="@{/orders/delete/{id}(id=${order.order_id})}" method="post">
            <button type="submit">Delete</button>
        </form>
    </td>
</tr>
