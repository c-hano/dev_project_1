<!Doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>상품 주문 페이지 </title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<h1>Girds & Circle</h1>
<div>
    <h2>상품 목록</h2>
    <table>
        <tr>
            <th>상품 이름</th>
            <th>상품 가격</th>
            <th>추가</th>
        </tr>
        <tr th:each="product : ${products}">
            <td th:text="${product.productName}"></td>
            <td th:text="${product.productPrice} + '원'"></td>
            <td><button>추가</button></td>
        </tr>
    </table>
</div>
<div>
    <h2>Summary</h2>
    <p>총 금액: <span>15000원</span></p>
    <button>결제하기</button>
</div>
</body>
</html>
